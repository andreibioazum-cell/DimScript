name: Build DimScript APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run DimScript Compiler
        run: |
          mkdir -p app/src/main/cpp
          python3 dimc.py main.ds
          mv jni/main.cpp app/src/main/cpp/main.cpp

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimScript-Release
          path: app/build/outputs/apk/debug/app-debug.apk
