name: Build DimScript APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile DS to C++
        run: python3 dimc.py main.ds

      - name: Build Machine Code (ARM64)
        run: |
          # Используем Clang напрямую из NDK для генерации машинного кода
          $ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++ \
          -shared -fPIC -O3 main.cpp -llog -landroid -o libdimscript.so

      - name: Create Minimal APK
        run: |
          # Создаем структуру APK вручную
          mkdir -p build/lib/arm64-v8a
          mv libdimscript.so build/lib/arm64-v8a/
          
          # Генерируем минимальный манифест
          cat <<EOF > build/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.dim.ds">
            <application android:hasCode="false" android:label="DimScript">
              <activity android:name="android.app.NativeActivity" android:exported="true">
                <meta-data android:name="android.app.lib_name" android:value="dimscript" />
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF
          
          # Упаковываем в APK (это просто ZIP архив с определенной структурой)
          cd build && zip -r ../DimScript.apk .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimScript-Binary-APK
          path: DimScript.apk
