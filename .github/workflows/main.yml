name: Build DimScript APK

on: [push]

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: mkdir -p jni

      - name: Run DimScript Compiler
        run: python3 dimc.py main.ds

      - name: Compile Native Code
        run: |
          $ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++ \
          -shared -fPIC \
          jni/main.cpp \
          -Ijni \
          -llog -landroid \
          -o libdimscript.so

      - name: Package APK
        run: |
          zip DimScript_App.apk libdimscript.so AndroidManifest.xml

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DimScript-APK
          path: DimScript_App.apk
